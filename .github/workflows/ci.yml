name: CI

# Smoke da pipeline: roda em todo push na main e em PRs, garantindo que o
# que vai pra produção (Vercel) compila, passa nos tipos, nos testes e no build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Menor privilégio para o GITHUB_TOKEN.
permissions:
  contents: read

# Cancela runs obsoletos do mesmo ref (mas deixa a main sempre concluir).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  smoke:
    name: Lint, tipos, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Valores fictícios: o build NÃO acessa o Supabase (queries são
          # client-side), mas o client exige as envs presentes para não
          # lançar no import. Segredos reais ficam só na Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
